name: Build astra-sm (Entware aarch64-k3.10)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git wget \
                              libncurses5-dev gawk unzip file \
                              python3

      - name: Clone Entware
        run: |
          git clone https://github.com/Entware/Entware.git
          cd Entware
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for aarch64-k3.10
        run: |
          cd Entware
          cp configs/aarch64-k3.10.config .config
          make defconfig

      - name: Add astra-sm package
        run: |
          cd Entware
          mkdir -p package/astra-sm
          
          cat > package/astra-sm/Makefile << 'EOF'
          include $(TOPDIR)/rules.mk

          PKG_NAME:=astra-sm
          PKG_VERSION:=0.2.88
          PKG_RELEASE:=1

          PKG_SOURCE_PROTO:=git
          PKG_SOURCE_URL:=https://github.com/crazycat69/astra-sm.git
          PKG_SOURCE_VERSION:=master
          PKG_MIRROR_HASH:=skip

          include $(INCLUDE_DIR)/package.mk

          define Package/astra-sm
            SECTION:=net
            CATEGORY:=Network
            TITLE:=Astra Streaming Server
          endef

          define Build/Compile
            $(MAKE) -C $(PKG_BUILD_DIR)/src \
              CC="$(TARGET_CC)" \
              CXX="$(TARGET_CXX)"
          endef

          define Package/astra-sm/install
            $(INSTALL_DIR) $(1)/opt/bin
            $(INSTALL_BIN) $(PKG_BUILD_DIR)/src/astra $(1)/opt/bin/astra-sm
          endef

          $(eval $(call BuildPackage,astra-sm))
          EOF

      - name: Build astra-sm
        run: |
          cd Entware
          make package/astra-sm/compile V=s -j$(nproc)

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: astra-sm-ipk
          path: Entware/bin/packages/aarch64-k3.10/base/astra-sm*.ipk
