name: Build astra-sm for CoreELEC Entware (aarch64-k3.10)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gcc-aarch64-linux-gnu \
                              g++-aarch64-linux-gnu wget git file

      - name: Download Entware rootfs (sysroot source)
        run: |
          wget https://bin.entware.net/aarch64-k3.10/installer/generic.sh
          chmod +x generic.sh
          ./generic.sh
          mkdir sysroot
          cp -a /opt/* sysroot/

      - name: Clone astra-sm
        run: |
          git clone https://github.com/crazycat69/astra-sm.git

      - name: Build astra-sm against Entware sysroot
        run: |
          export SYSROOT=$PWD/sysroot
          export CC="aarch64-linux-gnu-gcc --sysroot=$SYSROOT"
          export CXX="aarch64-linux-gnu-g++ --sysroot=$SYSROOT"
          export STRIP=aarch64-linux-gnu-strip

          cd astra-sm/src
          make

          $STRIP astra

      - name: Create IPK
        run: |
          mkdir -p pkg/control
          mkdir -p pkg/data/opt/bin

          cp astra-sm/src/astra pkg/data/opt/bin/astra-sm

          echo "2.0" > pkg/debian-binary

          cat > pkg/control/control << EOF
          Package: astra-sm
          Version: 0.2.88-1
          Architecture: aarch64-3.10
          Maintainer: custom
          Description: Astra Streaming Server
          Depends: libgcc
          EOF

          tar -czf pkg/control.tar.gz -C pkg/control .
          tar -czf pkg/data.tar.gz -C pkg/data .

          ar r astra-sm_0.2.88-1_aarch64-3.10.ipk \
             pkg/debian-binary pkg/control.tar.gz pkg/data.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-sm-aarch64-k3.10
          path: astra-sm_0.2.88-1_aarch64-3.10.ipk
