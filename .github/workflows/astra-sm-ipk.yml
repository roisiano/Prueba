name: Build astra-sm for CoreELEC Entware (aarch64-k3.10)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install host dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git wget rsync unzip file

      - name: Download Entware SDK (aarch64-k3.10)
        run: |
          wget https://bin.entware.net/aarch64-k3.10/stable/SDK.tar.gz
          tar -xzf SDK.tar.gz
          mv SDK entware-sdk

      - name: Add astra-sm package
        run: |
          cd entware-sdk
          mkdir -p package/astra-sm

          cat > package/astra-sm/Makefile << 'EOF'
          include $(TOPDIR)/rules.mk

          PKG_NAME:=astra-sm
          PKG_VERSION:=0.2.88
          PKG_RELEASE:=1

          PKG_SOURCE_PROTO:=git
          PKG_SOURCE_URL:=https://github.com/crazycat69/astra-sm.git
          PKG_SOURCE_VERSION:=master
          PKG_MIRROR_HASH:=skip

          include $(INCLUDE_DIR)/package.mk

          define Package/astra-sm
            SECTION:=net
            CATEGORY:=Network
            TITLE:=Astra Streaming Server
            DEPENDS:=+libgcc
          endef

          define Build/Compile
            $(MAKE) -C $(PKG_BUILD_DIR)/src \
              CC="$(TARGET_CC)" \
              CXX="$(TARGET_CXX)"
          endef

          define Package/astra-sm/install
            $(INSTALL_DIR) $(1)/opt/bin
            $(INSTALL_BIN) $(PKG_BUILD_DIR)/src/astra $(1)/opt/bin/astra-sm
          endef

          $(eval $(call BuildPackage,astra-sm))
          EOF

      - name: Update feeds
        run: |
          cd entware-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure SDK
        run: |
          cd entware-sdk
          make defconfig

      - name: Build astra-sm
        run: |
          cd entware-sdk
          make package/astra-sm/compile V=s -j$(nproc)

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: astra-sm-aarch64-k3.10
          path: entware-sdk/bin/packages/aarch64-k3.10/base/astra-sm*.ipk
