name: Build astra-sm for CoreELEC Entware

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt update
          sudo apt install -y build-essential git wget \
                              autoconf automake libtool \
                              pkg-config g++-aarch64-linux-gnu \
                              gcc-aarch64-linux-gnu

      - name: Download Entware SDK (aarch64-k3.10)
        run: |
          wget https://bin.entware.net/aarch64-k3.10/installer/generic.sh
          chmod +x generic.sh
          ./generic.sh

      - name: Clone astra-sm
        run: |
          git clone https://github.com/crazycat69/astra-sm.git
          cd astra-sm

      - name: Build astra-sm (cross compile)
        run: |
          export PATH=/opt/bin:/opt/sbin:$PATH
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          export STRIP=aarch64-linux-gnu-strip

          cd astra-sm
          make clean || true
          make

      - name: Prepare IPK structure
        run: |
          mkdir -p pkg/control
          mkdir -p pkg/data/opt/bin

          cp astra-sm/src/astra pkg/data/opt/bin/astra-sm

          aarch64-linux-gnu-strip pkg/data/opt/bin/astra-sm

          echo "Package: astra-sm" > pkg/control/control
          echo "Version: 0.0.1" >> pkg/control/control
          echo "Architecture: aarch64-3.10" >> pkg/control/control
          echo "Maintainer: YourName" >> pkg/control/control
          echo "Description: Astra streaming server" >> pkg/control/control
          echo "Depends: libc" >> pkg/control/control

      - name: Build .ipk
        run: |
          cd pkg
          echo "2.0" > debian-binary
          tar -czf control.tar.gz -C control .
          tar -czf data.tar.gz -C data .
          ar r astra-sm_0.0.1_aarch64-3.10.ipk debian-binary control.tar.gz data.tar.gz
          mv astra-sm_0.0.1_aarch64-3.10.ipk ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-sm-ipk
          path: astra-sm_0.0.1_aarch64-3.10.ipk
