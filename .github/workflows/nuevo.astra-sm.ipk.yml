name: Build astra-sm ipk for CoreELEC

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build inside Entware Docker
        run: |
          docker run --rm -v $PWD:/build entware/aarch64-linux-gnu sh -c "
            apk update &&
            apk add build-base git lua5.3-dev lua5.3 ffmpeg-dev libaio-dev pkgconfig &&
            git clone https://github.com/Entware/entware.git /entware &&
            cd /entware &&
            ./scripts/feeds update -a &&
            ./scripts/feeds install -a &&
            mkdir -p package/astra-sm &&
            cp -r /build/astra-sm/* package/astra-sm/ &&
            make package/astra-sm/compile V=s
          "

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-sm-ipk
          path: entware/bin/packages/aarch64/astra-sm_*.ipk



