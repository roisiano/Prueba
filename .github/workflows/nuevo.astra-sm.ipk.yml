name: Build astra-sm ipk for CoreELEC

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python 2.7 portable
        run: |
          sudo apt update
          sudo apt install -y build-essential wget git pkg-config \
                              liblua5.3-dev lua5.3 libaio-dev \
                              libavcodec-dev libavformat-dev libavutil-dev \
                              libswscale-dev libswresample-dev libavfilter-dev

          wget https://www.python.org/ftp/python/2.7.18/Python-2.7.18.tgz
          tar xf Python-2.7.18.tgz
          cd Python-2.7.18
          ./configure --prefix=/usr/local/python2
          make -j$(nproc)
          sudo make install

          sudo ln -s /usr/local/python2/bin/python2 /usr/bin/python

      - name: Clone Entware buildroot
        run: |
          git clone https://github.com/Entware/entware.git entware-build
          cd entware-build
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy astra-sm package into Entware tree
        run: |
          mkdir -p entware-build/package/astra-sm
          cp -r astra-sm/* entware-build/package/astra-sm/

      - name: Build astra-sm
        run: |
          cd entware-build
          make package/astra-sm/compile V=s

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-sm-ipk
          path: entware-build/bin/packages/aarch64/astra-sm_*.ipk




