name: Build Astra-SM addon for CoreELEC 22

on:
  workflow_dispatch:

jobs:
  build:
    name: CoreELEC-22-AstraSM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ make git wget zip unzip xz-utils bc curl gperf \
            xsltproc xfonts-utils patchutils lzop libxml-parser-perl \
            libparse-yapp-perl openjdk-11-jre-headless openjdk-17-jre-headless \
            rsync rename jq rdfind autoconf-archive \
            gcc-multilib g++-multilib libc6:i386 libstdc++6:i386

      - name: Download CoreELEC 22
        run: |
          git clone --depth 1 https://github.com/CoreELEC/CoreELEC
          cd CoreELEC
          git checkout origin/coreelec-22

      - name: Copy Astra-SM addon
        run: |
          mkdir -p CoreELEC/packages/addons/service/astra-sm
          cp -R astra-sm-addon/* CoreELEC/packages/addons/service/astra-sm/

      - name: Build addon
        run: |
          cd CoreELEC
          ARCH=aarch64 PROJECT=Amlogic-ce DEVICE=Amlogic-no \
          scripts/create_addon astra-sm

      - name: List addon output
        run: |
          echo "=== Contenido de target/addons ==="
          ls -R CoreELEC/target/addons/ || true

      - name: List build logs
        run: |
          echo "=== Logs de compilación ==="
          ls -R CoreELEC/build*/.threads/logs/ || true

      - name: Verify addon ZIP exists
        run: |
          echo "=== Verificando ZIP ==="
          test -f CoreELEC/target/addons/service.astra-sm/*.zip

      - name: Upload addon ZIP
        uses: actions/upload-artifact@v4
        with:
          name: astra-sm-addon-coreelec22
          path: CoreELEC/target/addons/service.astra-sm/


