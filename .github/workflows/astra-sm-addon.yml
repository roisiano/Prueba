name: Build astra-sm addon for CoreELEC 22 (PROJECT=no)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git make gcc g++ unzip xz-utils python3

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone CoreELEC 22
        run: |
          git clone --depth=1 -b 22.0 https://github.com/CoreELEC/CoreELEC.git
          cd CoreELEC
          git submodule update --init --recursive

      - name: Copy addon files
        run: |
          mkdir -p CoreELEC/packages/addons/service/astra-sm
          cp -R astra-sm-addon/* CoreELEC/packages/addons/service/astra-sm/

      - name: Build addon
        run: |
          cd CoreELEC
          PROJECT=no ARCH=aarch64 scripts/build astra-sm

      - name: Upload addon ZIP
        uses: actions/upload-artifact@v4
        with:
          name: astra-sm-addon-coreelec22
          path: CoreELEC/target/addons/service.astra-sm/*.zip

