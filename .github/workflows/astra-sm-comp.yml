name: Build astra-sm (OpenWrt toolchain)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04

    steps:
      - name: Install build dependencies
        run: |
          apt update
          DEBIAN_FRONTEND=noninteractive apt install -y \
            autoconf automake libtool pkg-config make unzip wget git ca-certificates xz-utils

      - name: Download OpenWrt aarch64 toolchain
        run: |
          wget https://downloads.openwrt.org/releases/23.05.3/targets/rockchip/armv8/openwrt-sdk-23.05.3-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar xf openwrt-sdk-*.tar.xz
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
          mv "$SDK_DIR" toolchain

      - name: Export toolchain
        run: |
          TOOLCHAIN_BIN=$(find /github/workspace/toolchain -type d -name "bin")
          echo "PATH=$PATH:$TOOLCHAIN_BIN" >> /etc/environment
          echo "PATH=$PATH:$TOOLCHAIN_BIN" >> $GITHUB_ENV

      - name: Clone astra-sm (GitLab repo)
        run: |
          git clone https://gitlab.com/berdyansk/astra-sm.git
          cd astra-sm
          autoreconf -fi

      - name: Configure astra-sm
        run: |
          cd astra-sm
          export CC=aarch64-openwrt-linux-musl-gcc
          export CXX=aarch64-openwrt-linux-musl-g++
          export AR=aarch64-openwrt-linux-musl-ar
          export LD=aarch64-openwrt-linux-musl-ld
          export STRIP=aarch64-openwrt-linux-musl-strip

          ./configure \
            --host=aarch64-openwrt-linux-musl \
            --prefix=/usr \
            --without-check \
            --without-ffmpeg \
            --without-libaio \
            --without-lua

      - name: Build astra-sm
        run: |
          cd astra-sm
          make -j$(nproc)
          $STRIP src/astra-sm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-sm-aarch64
          path: astra-sm/src/astra-sm





